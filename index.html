<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Traducteur Vocal</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; }
textarea { width: 100%; height: 80px; margin-bottom: 10px; }
button { padding: 10px 15px; margin-bottom: 10px; cursor: pointer; }
#traduction { border: 1px solid #ccc; padding: 10px; min-height: 40px; }
</style>
</head>
<body>
<h2>Traducteur Vocal Complet</h2>

<button id="parlerBtn">🎤 Parler</button><br><br>

<textarea id="original" placeholder="Texte original"></textarea><br>
<button id="traduireBtn">Traduire</button><br><br>

<div>
  <strong>Traduction :</strong>
  <p id="traduction">Ici la traduction</p>
</div>

<script>
// --- Reconnaissance vocale ---
const parlerBtn = document.getElementById('parlerBtn');
const original = document.getElementById('original');

let recognition;
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = function(event) {
        original.value = event.results[0][0].transcript;
    };
    recognition.onerror = function(event) {
        alert('Erreur reconnaissance vocale: ' + event.error);
    };
} else {
    alert("Ton navigateur ne supporte pas la reconnaissance vocale !");
}

parlerBtn.addEventListener('click', () => { recognition.start(); });

// --- Traduction ---
async function traduireTexte() {
    const texte = original.value;
    if (!texte) return alert("Parle ou écris un texte d'abord !");

    try {
        const response = await fetch('https://libretranslate.com/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                q: texte,
                source: 'auto',
                target: 'fr' // tu peux mettre 'en' ou 'ja'
            })
        });
        const data = await response.json();
        document.getElementById('traduction').innerText = data.translatedText;
    } catch (err) {
        console.error(err);
        document.getElementById('traduction').innerText = "Erreur lors de la traduction";
    }
}

document.getElementById('traduireBtn').addEventListener('click', traduireTexte);
</script>
</body>
</html>
