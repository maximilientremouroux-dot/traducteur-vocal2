<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Traducteur Vocal Complet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Traducteur Vocal Max</h1>

    <div class="container">
        <label for="langueSource">Langue source :</label>
        <select id="langueSource">
            <option value="fr">Français</option>
            <option value="en">Anglais</option>
            <option value="nl">Néerlandais</option>
            <option value="ja">Japonais</option>
        </select>

        <label for="langueCible">Langue cible :</label>
        <select id="langueCible">
            <option value="fr">Français</option>
            <option value="en">Anglais</option>
            <option value="nl">Néerlandais</option>
            <option value="ja">Japonais</option>
        </select>

        <br><br>

        <button id="btnParler">🎤 Parler</button>
        <button id="btnLire">🔊 Lire la traduction</button>

        <p id="texteOriginal">Texte original : </p>
        <p id="texteTraduit">Traduction : </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
